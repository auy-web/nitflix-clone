<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Netflix Clone</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1 class="logo">NETFLIX</h1>
    <button class="signin">Sign In</button>
</header>

<section class="hero">
    <div class="hero-text">
        <h2>Unlimited movies TV,</h2>
        <h3>Shows and More.</h3>
        <p>Watch anywhere and Cancel anytime.</p>
        <p>Ready to watch? enter your email to create or restart</p>
        <p>Your membership .</p>

        <input type="email" placeholder="Enter your email">
        <button onclick="subscribe()">Get Started</button>
    </div>
</section>

<section class="movies">
    <h2>Popular on Netflix</h2>

    <div class="movie-row">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQuMexr5iBAANBLc3DWdW34kf1zgwCJkOfm0g&s">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRFhzVsG_tBvDKjJAJr8ua07txiafbqR2IcRQ&s">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQt8VyfW6IzCZBeKuRFWKxqPYVnAB03ZWnmyw&s">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQIM0-w43ChyvBSM5cXykYx5NV-Yl0WEX6Aqw&s">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSh3Zc8nSze5S8vtzX49maUGoedcdli-2aj-Q&s">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQpCkLGD5QILxxv_hoeqqNeAySv0a3_2kg9xw&s">
        <img src="https://i.pinimg.com/736x/6e/d8/86/6ed8865d6712fb9f41c14f11e553bdf3.jpg">
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
